<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar no Studdo</title>
</head>
<body style="margin:0;padding:0;background-color:#0D1B2A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0D1B2A;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(99,102,241,0.08));border:1px solid rgba(139,92,246,0.2);border-radius:24px;padding:40px 32px;">
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <div style="width:56px;height:56px;background:linear-gradient(135deg,#8B5CF6,#4F46E5);border-radius:16px;display:inline-block;line-height:56px;text-align:center;">
                <span style="color:white;font-size:28px;font-weight:900;">S</span>
              </div>
            </td>
          </tr>
          <!-- Title -->
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <h1 style="margin:0;color:#FFFFFF;font-size:24px;font-weight:800;">Entrar no Studdo</h1>
            </td>
          </tr>
          <!-- Subtitle -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <p style="margin:0;color:rgba(240,244,248,0.5);font-size:14px;line-height:1.5;">
                Clique no botao abaixo para acessar sua conta
              </p>
            </td>
          </tr>
          <!-- Button -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;background:linear-gradient(135deg,#8B5CF6,#4F46E5);color:#FFFFFF;font-size:15px;font-weight:700;text-decoration:none;border-radius:12px;box-shadow:0 8px 24px rgba(139,92,246,0.3);">
                Acessar minha conta
              </a>
            </td>
          </tr>
          <!-- Security note -->
          <tr>
            <td style="padding:20px;background:rgba(255,255,255,0.03);border-radius:16px;border:1px solid rgba(255,255,255,0.06);">
              <p style="margin:0;color:rgba(240,244,248,0.5);font-size:12px;line-height:1.6;">
                &#x1F512; Este link e de uso unico e expira em 24 horas. Se voce nao solicitou este acesso, ignore este email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:32px;">
              <p style="margin:0;color:rgba(240,244,248,0.25);font-size:11px;line-height:1.5;">
                <a href="https://www.studdo.com.br" style="color:rgba(139,92,246,0.6);text-decoration:none;">www.studdo.com.br</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
