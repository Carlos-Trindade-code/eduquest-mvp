<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D1B2A" />
  <title>Studdo — Sem conexão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0D1B2A 0%, #1A1A2E 50%, #16213E 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #f0f4f8;
      padding: 24px;
      text-align: center;
    }
    .container {
      max-width: 380px;
      width: 100%;
    }
    .owl {
      font-size: 72px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: rgba(240, 244, 248, 0.5);
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #8B5CF6, #4F46E5);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }
    .status {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(240, 244, 248, 0.3);
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #EF4444;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="owl">🦉</div>
    <h1>Ops, sem internet!</h1>
    <p>O Edu não consegue se conectar agora. Verifique sua conexão e tente novamente.</p>
    <button class="btn" onclick="window.location.reload()">
      ↻ Tentar novamente
    </button>
    <div class="status">
      <span class="dot"></span>Offline
    </div>
  </div>
</body>
</html>
